services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        # IMPORTANT: Vite reads this at IMAGE BUILD time, not runtime.
        # Use nginx proxy so host/IP doesn't matter.
        VITE_API_BASE: "/api"
    ports:
      - "4000:80"
    depends_on:
      - backend
